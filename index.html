<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xatruch RPG</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        overflow: hidden;
        font-family: sans-serif;
      }
      #game-container {
        width: 100%;
        height: 78dvh;
      }
      #controls {
        width: 100%;
        height: 20dvh;
        background: #0f0f1e;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        padding-bottom: env(safe-area-inset-bottom);
        border-top: 1px solid #222;
      }
      .joystick-zone {
        width: 100px;
        height: 100px;
        position: relative;
      }
      .context-buttons {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
      }
      .ctx-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #1a1a3a;
        border: 1px solid #333;
        color: #c9a84c;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        -webkit-user-select: none;
user-select: none;
        user-select: none;
      }
      .action-buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }
      .act-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 2px solid;
        font-size: 13px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        -webkit-user-select: none;
user-select: none;
        user-select: none;
      }
      .btn-a { background: #2a1a1a; border-color: #c9a84c; color: #c9a84c; }
      .btn-b { background: #1a2a1a; border-color: #5aaa5a; color: #5aaa5a; }
      .btn-x { background: #1a1a2a; border-color: #5a5aaa; color: #5a5aaa; }
      .btn-y { background: #2a1a2a; border-color: #aa5aaa; color: #aa5aaa; }

      #joy-base {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: rgba(42, 42, 74, 0.9);
  border: 2px solid #444466;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
#joy-thumb {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #c9a84c;
  position: absolute;
  touch-action: none;
}

    </style>
    <script type="module" crossorigin src="/XatruchRPG/assets/index-DNrZjNiy.js"></script>
  </head>

  
  <body>
    <div id="game-container"></div>
    <div id="controls">
      <div class="joystick-zone" id="joystick-zone">
  <div id="joy-base">
    <div id="joy-thumb"></div>
  </div>
</div>
      <div class="context-buttons">
        <div class="ctx-btn" id="ctx1">🗺️</div>
        <div class="ctx-btn" id="ctx2">⚡</div>
        <div class="ctx-btn" id="ctx3">🌀</div>
      </div>
      <div class="action-buttons">
        <div class="act-btn btn-a">A</div>
        <div class="act-btn btn-b">B</div>
        <div class="act-btn btn-x">X</div>
        <div class="act-btn btn-y">Y</div>
      </div>
    </div>

<script>
const base = document.getElementById('joy-base')
const thumb = document.getElementById('joy-thumb')
let active = false
let startX, startY
const maxDist = 22

base.addEventListener('touchstart', (e) => {
  active = true
  const t = e.touches[0]
  const r = base.getBoundingClientRect()
  startX = r.left + r.width / 2
  startY = r.top + r.height / 2
})

document.addEventListener('touchmove', (e) => {
  if (!active) return
  e.preventDefault()
  const t = e.touches[0]
  let dx = t.clientX - startX
  let dy = t.clientY - startY
  const dist = Math.sqrt(dx * dx + dy * dy)
  if (dist > maxDist) {
    dx = (dx / dist) * maxDist
    dy = (dy / dist) * maxDist
  }
  thumb.style.transform = `translate(${dx}px, ${dy}px)`
}, { passive: false })

document.addEventListener('touchend', () => {
  active = false
  thumb.style.transform = 'translate(0px, 0px)'
})
</script>

  </body>
</html>
